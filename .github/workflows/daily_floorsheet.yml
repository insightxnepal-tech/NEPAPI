name: Daily NEPSE Floorsheet Fetcher

on:
  schedule:
    # 4:00 PM NPT is 10:15 AM UTC
    - cron: '15 10 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-floorsheet:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run floorsheet fetcher
        run: |
          echo "Starting fetcher..."
          python fetch_today.py
          echo "Fetcher finished."

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Only try to add and commit if CSV files exist
          if ls floorsheet*.csv 1> /dev/null 2>&1; then
            git add floorsheet*.csv
            git diff --quiet && git diff --staged --quiet || (git commit -m "Automated: Floorsheet Update $(date +'%Y-%m-%d')" && git push)
          else
            echo "No floorsheet files found to commit."
          fi
