name: Daily NEPSE Portfolio Report

on:
  schedule:
    # 10:45 AM UTC is 4:30 PM Nepal Time (NST)
    # Market runs Sun-Thu. 0=Sun, 4=Thu.
    - cron: '45 10 * * 0-4'
  workflow_dispatch: # Allows manual trigger
    inputs:
      scan_all:
        description: 'Scan All NEPSE Stocks (Market-Wide)?'
        required: true
        type: boolean
        default: false

jobs:
  run-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib requests openpyxl tqdm pywasm httpx
          pip install git+https://github.com/basic-bgnr/NepseUnofficialApi.git@dev

      - name: Fetch Latest Floorsheet
        run: python fetch_floorsheet_csv.py

      - name: Run Portfolio Intelligence Report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_portfolio_report.py

      - name: Run Portfolio Sniper Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.scan_all }}" == "true" ]; then
            python sniper_scanner.py --all
          else
            python sniper_scanner.py
          fi

      - name: Run Portfolio Whale Alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python portfolio_whale_alert.py
