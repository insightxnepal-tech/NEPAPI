name: Daily Pre-Market Strategy + Telegram

on:
  schedule:
    # 10:00 AM NPT = 4:15 AM UTC  (Sun–Thu = NEPSE trading days)
    - cron: '15 4 * * 0-4'
  workflow_dispatch:

jobs:
  strategy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Run pre-market strategy & send Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python premarket_strategy.py .

      - name: Commit strategy report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if ls strategy_*.md 1>/dev/null 2>&1; then
            git add strategy_*.md
            git diff --quiet && git diff --staged --quiet || \
              (git commit -m "📊 Pre-Market Strategy $(date +'%Y-%m-%d')" && git push)
          fi
