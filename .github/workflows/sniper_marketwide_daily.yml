name: Daily Market-Wide Sniper Buys (Telegram)

on:
  schedule:
    # 11:00 AM Nepal Time (Asia/Kathmandu = UTC+5:45) => 05:15 UTC
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  sniper-marketwide:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests tqdm
          pip install git+https://github.com/basic-bgnr/NepseUnofficialApi.git@dev

      - name: Run Market-Wide Sniper Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sniper_scanner.py --all

