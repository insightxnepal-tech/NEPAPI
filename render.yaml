services:
  - type: web
    name: nepse-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements_bot.txt
    startCommand: uvicorn telegram_bot:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src
